<body>
<div class="container">
    <h1><i class="fas fa-box"></i> Товары и документация</h1>
    <p style="margin-top: -5px; color: #475569;">Сертификаты, декларации, СГР • загрузка PDF • редактирование</p>
    
    <div class="toolbar">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Поиск по наименованию..." autocomplete="off">
        </div>
        <div>
            <span id="syncStatus" class="sync-status"><i class="fas fa-cloud"></i> <span id="syncText">Готово</span></span>
            <button class="btn btn-primary" id="addProductBtn"><i class="fas fa-plus-circle"></i> Добавить товар</button>
            <button class="btn" id="loadDemoBtn" style="display:none;"><i class="fas fa-download"></i> Загрузить демо-данные</button>
            <button class="btn" id="resetDataBtn" title="Сбросить к исходным данным из Excel"><i class="fas fa-undo-alt"></i> Сброс</button>
        </div>
    </div>

    <div class="filter-panel">
        <span style="font-weight:500;"><i class="fas fa-clock"></i> Скоро истекает:</span>
        <select id="expiryPeriodSelect" class="filter-select">
            <option value="1">1 месяц</option>
            <option value="2" selected>2 месяца</option>
            <option value="3">3 месяца</option>
            <option value="6">6 месяцев</option>
        </select>
        <button class="btn btn-sm" id="applyExpiringFilterBtn"><i class="fas fa-filter"></i> Показать</button>
        
        <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
            <span id="expiredCountBadge" class="expired-badge"><i class="fas fa-exclamation-circle"></i> <span id="expiredCount">0</span> просрочено</span>
            <button class="btn btn-sm" id="showExpiredBtn"><i class="fas fa-list"></i> Показать просроченные</button>
            <button class="btn btn-sm" id="clearFilterBtn"><i class="fas fa-times"></i> Сбросить фильтр</button>
        </div>
        <span id="filterInfo" class="filter-badge" style="display:none;"></span>
    </div>

    <div class="table-wrapper">
        <table id="productTable">
            <thead>
                <tr>
                    <th class="sortable" data-sort="name">Наименование <i class="fas fa-sort" id="sortIconName"></i></th>
                    <th>Документ</th>
                    <th class="sortable" data-sort="expiry">Срок действия <i class="fas fa-sort" id="sortIconExpiry"></i></th>
                    <th>ТН ВЭД</th>
                    <th>ОКПД2</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>

        </table>
    </div>

</div>

<!-- Модальное окно редактирования -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Новый товар</h3>
            <button class="icon-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <form id="productForm" onsubmit="return false;">
            <input type="hidden" id="productId">
            <div class="form-group">
                <label><i class="fas fa-tag"></i> Наименование *</label>
                <input type="text" id="prodName" class="form-control" required placeholder="Полное наименование">
            </div>
            <div class="form-group">
                <label><i class="fas fa-shield"></i> Тип документа (сертификация)</label>
                <input type="text" id="certType" class="form-control" placeholder="Декларация / СГР / ОТСУТСТВУЮТ ...">
            </div>
            <div class="form-group">
                <label><i class="fas fa-file-pdf"></i> PDF документ</label>
                <input type="file" id="pdfUpload" accept=".pdf,application/pdf" class="form-control">
                <div class="file-info" id="pdfInfoArea">
                    <span id="currentPdfLabel">Нет загруженного файла</span>
                    <button type="button" id="removePdfBtn" class="btn-link" style="display:none;"><i class="fas fa-trash-alt"></i> Удалить PDF</button>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Срок действия</label>
                <input type="date" id="expiryDate" class="form-control">
            </div>
            <div class="form-group">
                <label><i class="fas fa-barcode"></i> ТН ВЭД</label>
                <input type="text" id="tnved" class="form-control" placeholder="Код ТН ВЭД">
            </div>
            <div class="form-group">
                <label><i class="fas fa-chart-pie"></i> ОКПД2</label>
                <input type="text" id="okpd2" class="form-control" placeholder="Код ОКПД2">
            </div>
            <div class="modal-actions">
                <button class="btn" type="button" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" type="button" id="saveProductBtn">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<!-- Модальное окно просмотра PDF -->

        </div>
        <iframe id="pdfFrame" src="" title="PDF документ"></iframe>
    </div>
</div>

        function setSyncStatus(text, isError = false) {
            syncText.textContent = text;
            syncText.style.color = isError ? '#dc2626' : '#64748b';
        }

        // ---------- ЗАГРУЗКА ДЕМО-ДАННЫХ ----------
       async function loadDemoData() {
    setSyncStatus('Загрузка демо-данных...');
    try {
        const response = await fetch(API_URL + '?action=initDemo');
        const result = await response.json();
        if (result.success) {
            setSyncStatus('Демо-данные загружены');
            await loadProducts();
        } else {
            throw new Error('Ошибка инициализации');
        }
    } catch(e) {
        console.error(e);
        setSyncStatus('Ошибка загрузки демо', true);
        alert('Не удалось загрузить демо-данные');
    }
}

        // ---------- ЗАГРУЗКА ИЗ GOOGLE SHEETS ----------
        async function loadProducts() {
            setSyncStatus('Загрузка...');
            try {
                const response = await fetch(API_URL + '?action=getAll');
                const data = await response.json();
                if (Array.isArray(data)) {
                    if (data.length === 0) {
                        loadDemoBtn.style.display = 'inline-flex';
                        products = [];
                        setSyncStatus('Таблица пуста');
                    } else {
                        loadDemoBtn.style.display = 'none';
                        products = data.map(p => ({
                            ...p,
                            id: p.id || crypto.randomUUID?.(),
                            expiry: p.expiry || '',
                            pdf: p.pdf || null,
                            pdfName: p.pdfName || ''
                        }));
                        setSyncStatus('Синхронизировано');
                    }
                } else {
                    console.warn('Ответ не массив, используем исходные данные');
                    products = [...INITIAL_PRODUCTS];
                    setSyncStatus('Локальные данные', true);
                }
            } catch(e) {
                console.error('Ошибка загрузки из Google Sheets:', e);
                products = [...INITIAL_PRODUCTS];
                setSyncStatus('Ошибка загрузки', true);
            }
            updateExpiredBadge();
            renderTable();
        }

        async function saveToStorage() {
            setSyncStatus('Сохранение...');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(products),
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();
                if (result.success) {
                    setSyncStatus('Сохранено');
                } else {
                    throw new Error('Ошибка сохранения');
                }
            } catch(e) {
                console.error('Ошибка сохранения в Google Sheets:', e);
                setSyncStatus('Ошибка сохранения', true);
                alert('Изменения не синхронизированы с Google Таблицей.');
            }
            updateExpiredBadge();
        }

        async function resetToInitial() {
            products = INITIAL_PRODUCTS.map(p => ({ ...p, id: p.id || crypto.randomUUID?.() }));
            await saveToStorage();
            filterMode = 'all';
            filterInfo.style.display = 'none';
            renderTable();
        }

        // ---------- ФИЛЬТРАЦИЯ И СОРТИРОВКА ----------
        function getFilteredAndSortedProducts() {
            let filtered = [...products];
            const searchTerm = searchInput.value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
            }
            const today = getTodayStr();
            if (filterMode === 'expiring') {
                const futureDate = new Date(today);
                futureDate.setMonth(futureDate.getMonth() + expiryFilterMonths);
                const futureStr = futureDate.toISOString().split('T')[0];
                filtered = filtered.filter(p => p.expiry && p.expiry >= today && p.expiry <= futureStr);
            } else if (filterMode === 'expired') {
                filtered = filtered.filter(p => p.expiry && p.expiry < today);
            }
            if (currentSort.field) {
                filtered.sort((a, b) => {
                    let valA, valB;
                    if (currentSort.field === 'name') {
                        valA = a.name.toLowerCase();
                        valB = b.name.toLowerCase();
                    } else {
                        valA = a.expiry || '';
                        valB = b.expiry || '';
                        if (!valA && !valB) return 0;
                        if (!valA) return 1;
                        if (!valB) return -1;
                    }
                    let result = valA < valB ? -1 : (valA > valB ? 1 : 0);
                    return currentSort.direction === 'asc' ? result : -result;
                });
            }
            return filtered;
        }

        function updateFilterBadge() {
            if (filterMode === 'expiring') {
                filterInfo.style.display = 'inline-flex';
                filterInfo.innerHTML = `<i class="fas fa-hourglass-half"></i> Истекает в течение ${expiryFilterMonths} мес. <button class="icon-btn" onclick="clearFilter()"><i class="fas fa-times"></i></button>`;
            } else if (filterMode === 'expired') {
                filterInfo.style.display = 'inline-flex';
                filterInfo.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Просроченные документы <button class="icon-btn" onclick="clearFilter()"><i class="fas fa-times"></i></button>`;
            } else {
                filterInfo.style.display = 'none';
            }
        }

        window.clearFilter = function() {
            filterMode = 'all';
            updateFilterBadge();
            renderTable();
        };

        // ---------- РЕНДЕР ТАБЛИЦЫ ----------
        function renderTable() {
            const filtered = getFilteredAndSortedProducts();
            if (filtered.length === 0) {
                tbody.innerHTML = '';
                document.getElementById('noResultsMsg').style.display = 'block';
                return;
            }
            document.getElementById('noResultsMsg').style.display = 'none';
            const today = getTodayStr();
            let html = '';
            filtered.forEach(prod => {
                const expiry = prod.expiry || '';
                const isExpired = expiry && expiry < today;
                const statusText = expiry ? (isExpired ? 'Просрочен' : 'Действующий') : '—';
                const statusClass = expiry ? (isExpired ? 'badge-expired' : 'badge-valid') : '';
                const hasPdf = !!(prod.pdf && prod.pdf.length > 10);
                const displayExpiry = formatDisplayDate(expiry);
                html += `<tr>
                    <td class="product-name">${escapeHtml(prod.name)}</td>
                    <td>
                        <button class="doc-btn ${hasPdf ? 'has-pdf' : ''}" onclick="openDocument('${prod.id}')">
                            <i class="fas fa-file-pdf"></i> ${hasPdf ? 'Открыть' : 'Нет файла'}
                        </button>
                        ${prod.certType ? `<span class="badge" style="margin-left:6px;">${escapeHtml(prod.certType)}</span>` : ''}
                    </td>
                    <td class="date-cell">${displayExpiry}</td>
                    <td>${prod.tnved || '—'}</td>
                    <td>${prod.okpd2 || '—'}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="icon-btn" onclick="editProduct('${prod.id}')"><i class="fas fa-edit"></i></button>
                            <button class="icon-btn" onclick="deleteProduct('${prod.id}')"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
            updateSortIcons();
        }

        function updateSortIcons() {
            const nameIcon = document.getElementById('sortIconName');
            const expiryIcon = document.getElementById('sortIconExpiry');
            nameIcon.className = 'fas fa-sort';
            expiryIcon.className = 'fas fa-sort';
            if (currentSort.field === 'name') {
                nameIcon.className = currentSort.direction === 'asc' ? 'fas fa-sort-up' : 'fas fa-sort-down';
            } else if (currentSort.field === 'expiry') {
                expiryIcon.className = currentSort.direction === 'asc' ? 'fas fa-sort-up' : 'fas fa-sort-down';
            }
        }

        document.querySelectorAll('th.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const field = th.dataset.sort;
                if (currentSort.field === field) {
                    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort.field = field;
                    currentSort.direction = 'asc';
                }
                renderTable();
            });
        });

        // ---------- РАБОТА С PDF ----------
        window.openDocument = function(id) {
            const product = products.find(p => p.id === id);
            if (!product || !product.pdf) { alert('PDF не загружен'); return; }
            pdfFrame.src = product.pdf;
            pdfModal.classList.add('active');
        };

        function closePdfModal() {
            pdfModal.classList.remove('active');
            pdfFrame.src = '';
        }

        // ---------- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ----------
        function openModal(editId = null) {
            currentEditId = editId;
            pendingPdfFile = null;
            const pdfUpload = document.getElementById('pdfUpload');
            pdfUpload.value = '';
            if (editId) {
                const prod = products.find(p => p.id === editId);
                if (!prod) return;
                document.getElementById('modalTitle').innerText = 'Редактирование товара';
                document.getElementById('productId').value = prod.id;
                document.getElementById('prodName').value = prod.name || '';
                document.getElementById('certType').value = prod.certType || '';
                document.getElementById('expiryDate').value = prod.expiry || '';
                document.getElementById('tnved').value = prod.tnved || '';
                document.getElementById('okpd2').value = prod.okpd2 || '';
                updatePdfInfo(prod.pdf, prod.pdfName);
            } else {
                document.getElementById('modalTitle').innerText = 'Новый товар';
                document.getElementById('productId').value = '';
                document.getElementById('prodName').value = '';
                document.getElementById('certType').value = '';
                document.getElementById('expiryDate').value = '';
                document.getElementById('tnved').value = '';
                document.getElementById('okpd2').value = '';
                updatePdfInfo(null, null);
            }
            modal.classList.add('active');
        }

        function updatePdfInfo(pdfData, pdfName) {
            const label = document.getElementById('currentPdfLabel');
            const removeBtn = document.getElementById('removePdfBtn');
            if (pdfData) {
                label.innerHTML = `<i class="fas fa-check-circle" style="color:#15803d;"></i> ${escapeHtml(pdfName || 'документ.pdf')}`;
                removeBtn.style.display = 'inline-flex';
            } else {
                label.innerText = 'Нет загруженного файла';
                removeBtn.style.display = 'none';
            }
            label.dataset.pdf = pdfData || '';
            label.dataset.pdfName = pdfName || '';
        }

        document.getElementById('removePdfBtn').addEventListener('click', () => {
            updatePdfInfo(null, null);
            document.getElementById('pdfUpload').value = '';
            pendingPdfFile = null;
        });

        document.getElementById('pdfUpload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                pendingPdfFile = file;
                document.getElementById('currentPdfLabel').innerHTML = `<i class="fas fa-file-pdf"></i> Новый: ${escapeHtml(file.name)}`;
                document.getElementById('removePdfBtn').style.display = 'inline-flex';
            } else if (file) {
                alert('Выберите PDF-файл');
                e.target.value = '';
            }
        });

        function readPdfAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = () => reject('Ошибка чтения');
                reader.readAsDataURL(file);
            });
        }

        async function handleSaveProduct() {
            const name = document.getElementById('prodName').value.trim();
            if (!name) { alert('Введите наименование'); return; }
            const id = currentEditId || crypto.randomUUID?.() || 'new-'+Date.now();
            const expiry = document.getElementById('expiryDate').value;
            const tnved = document.getElementById('tnved').value.trim();
            const okpd2 = document.getElementById('okpd2').value.trim();
            const certType = document.getElementById('certType').value.trim();
            const label = document.getElementById('currentPdfLabel');
            let pdfData = label.dataset.pdf || null;
            let pdfName = label.dataset.pdfName || '';
            if (pendingPdfFile) {
                try {
                    pdfData = await readPdfAsDataUrl(pendingPdfFile);
                    pdfName = pendingPdfFile.name;
                } catch(e) {
                    alert('Не удалось прочитать PDF');
                    return;
                }
            }
            const productData = { id, name, certType, expiry, tnved, okpd2, pdf: pdfData, pdfName };
            if (currentEditId) {
                const index = products.findIndex(p => p.id === currentEditId);
                if (index !== -1) products[index] = productData;
            } else {
                products.push(productData);
            }
            await saveToStorage();
            closeModal();
            renderTable();
        }

        window.editProduct = (id) => openModal(id);
        window.deleteProduct = async (id) => {
            if (!confirm('Удалить этот товар?')) return;
            products = products.filter(p => p.id !== id);
            await saveToStorage();
            renderTable();
        };

        function closeModal() {
            modal.classList.remove('active');
            currentEditId = null;
            pendingPdfFile = null;
        }

        // ---------- ПРИВЯЗКА СОБЫТИЙ ----------
        document.getElementById('addProductBtn').addEventListener('click', () => openModal(null));
        loadDemoBtn.addEventListener('click', loadDemoData);
        document.getElementById('resetDataBtn').addEventListener('click', () => {
            if (confirm('Вернуть исходный список товаров? Все изменения будут потеряны.')) resetToInitial();
        });
        document.getElementById('saveProductBtn').addEventListener('click', handleSaveProduct);
        searchInput.addEventListener('input', renderTable);
        document.getElementById('applyExpiringFilterBtn').addEventListener('click', () => {
            expiryFilterMonths = parseInt(document.getElementById('expiryPeriodSelect').value);
            filterMode = 'expiring';
            updateFilterBadge();
            renderTable();
        });
        document.getElementById('showExpiredBtn').addEventListener('click', () => {
            filterMode = 'expired';
            updateFilterBadge();
            renderTable();
        });
        document.getElementById('clearFilterBtn').addEventListener('click', () => {
            filterMode = 'all';
            updateFilterBadge();
            renderTable();
        });
        
        window.closeModal = closeModal;
        window.closePdfModal = closePdfModal;

        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        pdfModal.addEventListener('click', (e) => { if (e.target === pdfModal) closePdfModal(); });

        // Старт
        loadProducts();
    })();
</script>
</body>
</html>
